name: SonarQube Scan (Reusable)

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        description: "SonarQube analysis token"
        required: true
      SONAR_HOST_URL:
        description: "SonarQube server URL"
        required: true
      CF_ACCESS_CLIENT_ID:
        description: "Cloudflare Access service token ID"
        required: true
      CF_ACCESS_CLIENT_SECRET:
        description: "Cloudflare Access service token secret"
        required: true

jobs:
  scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Cloudflare Access proxy
        env:
          SONAR_URL: ${{ secrets.SONAR_HOST_URL }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          SONAR_HOST=$(echo "$SONAR_URL" | sed 's|https\?://||')
          sudo apt-get update -qq && sudo apt-get install -y -qq nginx >/dev/null
          sudo rm -f /etc/nginx/sites-enabled/default
          cat <<CONF | sudo tee /etc/nginx/sites-enabled/sonar-proxy
          server {
              listen 9000;
              location / {
                  proxy_pass ${SONAR_URL};
                  proxy_set_header Host ${SONAR_HOST};
                  proxy_set_header CF-Access-Client-Id "${CF_ID}";
                  proxy_set_header CF-Access-Client-Secret "${CF_SECRET}";
                  proxy_ssl_server_name on;
              }
          }
          CONF
          sudo nginx -t && sudo systemctl restart nginx
          sleep 1
          curl -sf http://localhost:9000/api/system/status && echo " Proxy OK" || echo "::warning::Proxy health check failed"

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000
