name: SonarQube Scan (Reusable)

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version for running tests (empty = skip tests)"
        required: false
        default: ""
        type: string
      install_command:
        description: "Command to install project + dev deps"
        required: false
        default: 'pip install -e ".[dev]"'
        type: string
      test_command:
        description: "Pytest command to generate coverage XML"
        required: false
        default: ""
        type: string
    secrets:
      SONAR_TOKEN:
        description: "SonarQube analysis token"
        required: true
      SONAR_HOST_URL:
        description: "SonarQube server URL"
        required: true
      CF_ACCESS_CLIENT_ID:
        description: "Cloudflare Access service token ID"
        required: true
      CF_ACCESS_CLIENT_SECRET:
        description: "Cloudflare Access service token secret"
        required: true

jobs:
  scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: inputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        if: inputs.python_version != ''
        run: ${{ inputs.install_command }}

      - name: Run tests with coverage
        if: inputs.test_command != ''
        run: ${{ inputs.test_command }}

      - name: Setup Cloudflare Access proxy
        env:
          SONAR_URL: ${{ secrets.SONAR_HOST_URL }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          SONAR_HOST=$(echo "$SONAR_URL" | sed 's|https\?://||')
          sudo apt-get update -qq && sudo apt-get install -y -qq nginx >/dev/null
          sudo rm -f /etc/nginx/sites-enabled/default
          cat <<CONF | sudo tee /etc/nginx/sites-enabled/sonar-proxy
          server {
              listen 9000;
              location / {
                  proxy_pass ${SONAR_URL};
                  proxy_set_header Host ${SONAR_HOST};
                  proxy_set_header CF-Access-Client-Id "${CF_ID}";
                  proxy_set_header CF-Access-Client-Secret "${CF_SECRET}";
                  proxy_ssl_server_name on;
              }
          }
          CONF
          sudo nginx -t && sudo systemctl restart nginx
          sleep 1
          curl -sf http://localhost:9000/api/system/status && echo " Proxy OK" || echo "::warning::Proxy health check failed"

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Upload coverage report
        if: inputs.test_command != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload SonarQube scanner report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: .scannerwork/report-task.txt
          if-no-files-found: warn
          retention-days: 7

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000
