name: Release (Reusable)

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type (patch, minor, major)"
        required: true
        type: string
      branch:
        description: "Branch to release from"
        required: false
        default: "main"
        type: string
      version_file:
        description: "File containing the version (must have 'version = \"x.y.z\"')"
        required: false
        default: "pyproject.toml"
        type: string
    secrets:
      RELEASE_TOKEN:
        description: "PAT for pushing to branch-protected repos (falls back to GITHUB_TOKEN)"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(python3 - <<'EOF'
          import tomllib
          with open("${{ inputs.version_file }}", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ inputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump version in ${{ inputs.version_file }}
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.next }}"/' "${{ inputs.version_file }}"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.version_file }}"
          git commit -m "chore: release v${{ steps.version.outputs.next }}"
          git tag "v${{ steps.version.outputs.next }}"
          git push origin ${{ inputs.branch }}
          git push origin "v${{ steps.version.outputs.next }}"
